<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>طلب بدل الانتقال</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-100 to-blue-50 min-h-screen flex items-center justify-center">

  <div class="bg-white/95 backdrop-blur supports-[backdrop-filter]:bg-white/70 shadow-2xl rounded-2xl p-8 w-full max-w-lg space-y-5 border border-gray-200">
    <div>
      <h1 class="text-2xl font-bold text-center text-blue-700 tracking-tight">إنشاء طلب بدل الانتقال</h1>
      <p class="text-center text-gray-600 text-sm mt-2">املأ البيانات وأرسل الطلب مع صورة واضحة.</p>
    </div>

    <form id="perDiemForm" class="space-y-4">
      <div>
        <label for="customer_name" class="block text-gray-700 font-medium mb-1">اسم العميل</label>
        <input id="customer_name" placeholder="اكتب اسم العميل" class="w-full border border-gray-300 rounded-lg p-3 bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:border-blue-300 outline-none transition shadow-sm" required>
      </div>

      <div>
        <label for="notes" class="block text-gray-700 font-medium mb-1">الملاحظات</label>
        <textarea id="notes" placeholder="اكتب الملاحظات هنا..." class="w-full border border-gray-300 rounded-lg p-3 bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:border-blue-300 outline-none transition shadow-sm" required></textarea>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label for="latitude" class="block text-gray-700 font-medium mb-1">خط العرض</label>
          <input id="latitude" placeholder="مثال: 30.1680" type="number" step="any" class="w-full border border-gray-300 rounded-lg p-3 bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:border-blue-300 outline-none transition shadow-sm" required>
        </div>

        <div>
          <label for="longitude" class="block text-gray-700 font-medium mb-1">خط الطول</label>
          <input id="longitude" placeholder="مثال: 31.4535" type="number" step="any" class="w-full border border-gray-300 rounded-lg p-3 bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:border-blue-300 outline-none transition shadow-sm" required>
        </div>
      </div>

      <div>
        <label for="image" class="block text-gray-700 font-medium mb-1">الصورة</label>
        <div class="w-full border border-dashed border-gray-300 rounded-xl p-4 bg-gray-50 transition hover:border-blue-300">
          <input id="image" type="file" accept="image/*" class="block w-full text-sm text-gray-600 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:bg-blue-600 file:text-white file:hover:bg-blue-700" required>
          <p class="mt-2 text-xs text-gray-500">الحد الأقصى لحجم الصورة 10MB.</p>
        </div>
        <div class="mt-3 hidden rounded-xl border border-gray-200 bg-white p-3" id="previewCard">
          <img id="preview" class="rounded-lg border border-gray-100 w-full max-h-56 object-contain" alt="معاينة الصورة" />
        </div>
      </div>

      <button id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold transition-all duration-200 flex items-center justify-center gap-2">
        <span id="submitText">إرسال الطلب</span>
        <span id="submitSpinner" class="hidden w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
      </button>
    </form>

    <pre id="responseBox" class="mt-4 p-4 hidden rounded-lg border text-sm overflow-auto whitespace-pre-wrap break-words"></pre>
  </div>

  <script>
    const imageInput = document.getElementById('image');
    const preview = document.getElementById('preview');
    const previewCard = document.getElementById('previewCard');
    const submitBtn = document.getElementById('submitBtn');
    const submitSpinner = document.getElementById('submitSpinner');
    const submitText = document.getElementById('submitText');

    function setSubmitting(isSubmitting) {
      submitBtn.disabled = isSubmitting;
      submitBtn.classList.toggle("opacity-60", isSubmitting);
      submitBtn.classList.toggle("cursor-not-allowed", isSubmitting);
      submitSpinner.classList.toggle("hidden", !isSubmitting);
      submitText.textContent = isSubmitting ? "جارٍ الإرسال..." : "إرسال الطلب";
    }

    imageInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          preview.src = event.target.result;
          previewCard.classList.remove('hidden');
        };
        reader.readAsDataURL(file);
      } else {
        previewCard.classList.add('hidden');
      }
    });

    document.getElementById('perDiemForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const file = document.getElementById('image').files[0];
      const MAX_IMAGE_BYTES = 10 * 1024 * 1024; // 10MB (raw file size)
      const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
      });

      const responseBox = document.getElementById('responseBox');
      responseBox.classList.add('hidden');

      if (!file) {
        responseBox.classList.remove('hidden');
        responseBox.textContent = "خطأ: اختر صورة أولاً.";
        responseBox.className = "mt-4 p-4 rounded-lg border border-red-400 bg-red-50 text-sm overflow-auto";
        return;
      }

      if (file.size > MAX_IMAGE_BYTES) {
        responseBox.classList.remove('hidden');
        responseBox.textContent = `خطأ: حجم الصورة كبير جداً. الحد الأقصى ${Math.floor(MAX_IMAGE_BYTES / (1024 * 1024))}MB.`;
        responseBox.className = "mt-4 p-4 rounded-lg border border-red-400 bg-red-50 text-sm overflow-auto";
        return;
      }

      const imageBase64 = await toBase64(file);
      const body = {
        jsonrpc: "2.0",
        method: "call",
        params: {
          model: "per.diem",
          method: "create",
          args: [
            {
              customer_name: document.getElementById('customer_name').value,
              notes: document.getElementById('notes').value,
              is_mocking: false,
              image_data: imageBase64,
              latitude: parseFloat(document.getElementById('latitude').value),
              longitude: parseFloat(document.getElementById('longitude').value)
            }
          ],
          kwargs: {},
          context: {}
        }
      };

      try {
        setSubmitting(true);
        const res = await fetch("/proxy", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });

        const data = await res.text();
        responseBox.classList.remove('hidden');
        responseBox.textContent = data;
        responseBox.className = "mt-4 p-4 rounded-lg border border-green-400 bg-green-50 text-sm overflow-auto";
      } catch (err) {
        responseBox.classList.remove('hidden');
        responseBox.textContent = "خطأ: " + err.message;
        responseBox.className = "mt-4 p-4 rounded-lg border border-red-400 bg-red-50 text-sm overflow-auto";
      } finally {
        setSubmitting(false);
      }
    });
  </script>
</body>
</html>
